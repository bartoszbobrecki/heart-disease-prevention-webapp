version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cardio_app
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=cardio_app;Username=appuser;Password=password
    ports:
      - "5000:80"

volumes:
  db-data:
